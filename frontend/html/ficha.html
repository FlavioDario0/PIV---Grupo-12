<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Kineo</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/ficha.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@400..800&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="logoh">
            <img src="../assets/icons/logo_horizontal.svg">
        </div>
        <nav class="menu">
            <a href="home.html">Home</a>
            <a href="biblioteca.html">Biblioteca de Exercícios</a>
            <a href="ficha.html"  class="ativo">Ficha de Treinos</a>
            <a href="chat.html">Chat com IA</a>
            <a href="perfil.html">Perfil</a>
        </nav>        
    </header>

    <div class="container">
        <div class="top-controls">

            <h2>Treino do Dia:  </h2>

            <div class="dias">
                <button>Seg</button>
                <button>Ter</button>
                <button>Qua</button>
                <button class="ativo">Qui</button>
                <button>Sex</button>
                <button>Sab</button>
                <button>Dom</button>
            </div>

            <div class="treinos">
                <button>A</button>
                <button class="ativo">B</button>
                <button>C</button>
            </div>

        </div>

        <div class="content">
            <div class="table">
                <div class="table-header">
                    <span>Exercício</span>
                    <span>Séries</span>
                    <span>Repetições</span>
                    <span>Carga</span>
                    <span>Status</span>
                
                </div>

                <div id="table-body"></div>
                            
            </div>

            <aside class="sidebar">
                
                <button class="btn"> Adicionar Observação </button>

            </aside>
        </div>

        <div class="footer">
            <div class="status">
                <div class="content-status">
                    <h3>Status de Conclusão da Semana</h3>
                    <h3>
                        Treinos Concluídos: 
                        <span id="count-atual">0</span>/<span id="count-total">0</span>
                    </h3>
                </div>
                
                <div class="progress-bar">
                    <div id="progress"></div>
                </div>
            </div>
                
            <button class="finish">Concluir Treino</button>
        </div>

    </div>

    <div id="modal-obs" class="modal hidden">
        <div class="modal-content">
            <h3>Observações do treino</h3>
            <textarea id="input-obs" placeholder="Escreva sua observação..."></textarea>
            
            <div class="modal-actions">
                <button id="cancelar">Cancelar</button>
                <button id="salvar">Salvar</button>
            </div>
        </div>
    </div>

    <div id="modal-delete" class="modal hidden">
        <div class="modal-content">
            <h3>Excluir observação?</h3>
            <p>Essa ação não pode ser desfeita.</p>

            <div class="modal-actions">
                <button id="cancelar-delete">Cancelar</button>
                <button id="confirmar-delete">Excluir</button>
            </div>
        </div>
    </div>

<script src="../js/global.js"></script>
<script src="../js/ficha.js"></script>
</body>
</html>
