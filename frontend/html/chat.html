<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Kineo</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/chat.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@400..800&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="logoh">
            <img src="../assets/icons/logo_horizontal.svg">
        </div>
        <nav class="menu">
            <a href="pagina_principal.html">Home</a>
            <a href="biblioteca.html">Biblioteca de Exercícios</a>
            <a href="ficha.html">Ficha de Treinos</a>
            <a href="chat.html" class="ativo">Chat com IA</a>
            <a href="perfil.html">Perfil</a>
        </nav>        
    </header>

    <div class="container">

        <!-- Sidebar -->
        <aside class="sidebar">

            <button class="novo-chat">
                <img src="../assets/icons/new_chat.svg">
                Novo chat
            </button>

            <div class="chat-lista">
                <p>Chats</p>

                <div class="linha"></div>

                <div id="historico"></div>
            </div>

        </aside>


        <!-- Conteúdo principal -->
        <div class="main">

            <h1>Chat</h1>
            <h2>Olá! Em que posso ajudar?</h2>

            <div class="chat-central">

                <div id="chat-mensagens"></div>

                <div class="input-area">

                    <textarea id="msg" rows="1" placeholder="Pergunte ao Chat"></textarea>

                    <button id="enviar">
                        <img src="../assets/icons/send.svg">
                    </button>

                </div>

                <div class="acoes">

                    <button id="treino-btn">
                        Gerar treino personalizado
                    </button>

                    <button id="substituir-btn">
                        Substituir exercício
                    </button>

                </div>

            </div>

        </div>

    </div>

<script src="../js/global.js"></script>
<script src="../js/chat.js"></script>

</body>
</html>
