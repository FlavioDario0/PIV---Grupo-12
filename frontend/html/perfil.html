<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Kineo - Perfil</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/perfil.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@400..800&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="logoh">
            <img src="../assets/icons/logo_horizontal.svg">
        </div>
        <nav class="menu">
            <a href="pagina_principal.html">Home</a>
            <a href="biblioteca.html">Biblioteca de Exercícios</a>
            <a href="ficha.html">Ficha de Treinos</a>
            <a href="chat.html">Chat com IA</a>
            <a href="perfil.html" class="ativo">Perfil</a>
        </nav>        
    </header>

    <div class="username" id="user">Carregando...</div>

    <div class="card-user">
        <div class="bloco">
            <span class="label">Última atualização</span>
            <span class="valor-verde" id="data">--/--/----</span>
            <button class="btn">Atualizar dados</button>
        </div>

        <div class="bloco">
            <span class="label">Idade</span>
            <span class="valor" id="idade">--</span>
            <span class="sub">anos</span>
        </div>

        <div class="bloco">
            <span class="label">Altura</span>
            <span class="valor" id="altura">--</span>
            <span class="sub">(m)</span>
        </div>

        <div class="bloco">
            <span class="label">Peso atual</span>
            <span class="valor" id="peso">--</span>
            <span class="sub">(kg)</span>
        </div>

        <div class="bloco">
            <span class="label">Objetivo</span>
            <span class="valor" id="objetivo" style="font-size: 22px; text-transform: capitalize;">--</span>
            <span></span>
        </div>

        <div class="bloco">
            <span class="label">Nível</span>
            <span class="valor" id="nivel" style="font-size: 22px; text-transform: capitalize;">--</span>
            <span></span>
        </div>
    </div>

    <div class="evolucao">
        <div class="ev-peso">
            <h3>Evolução Peso Corporal</h3>
            <div class="card-peso">
                <canvas id="graficoPeso"></canvas>
            </div>
        </div>        

        <div class="ev-carga">
            <h3>Evolução Carga</h3>
            <div class="card-carga">
                <span class="titulo-destaques">DESTAQUES</span>

                <div id="destaques">
                    <div id="coluna1"></div>
                    <div id="coluna2"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="historico">
        <div class="hist">
            <h3>Histórico de Treinos</h3>
            <div class="table-hist"></div>
        </div>        
    </div>

    <div id="modal-atualizar" class="modal hidden">
        <div class="modal-content">
            <h3>Atualizar dados</h3>
            <div class="row">
                <div class="campo">
                    <label>Altura (m)</label>
                    <input id="altura-card" class="inp" type="number" step="0.01">
                </div>
                <div class="campo">
                    <label>Peso (kg)</label>
                    <input id="peso-card" class="inp" type="number" step="0.1">
                </div> 
                <div class="campo">
                    <label>Nível</label>
                    <select id="nivel-card" class="inp" style="height: 44px; background: #222; color: #fff; border: none; border-radius: 8px;">
                        <option value="iniciante">Iniciante</option>
                        <option value="intermediario">Intermediário</option>
                        <option value="avancado">Avançado</option>
                    </select>
                </div>               
            </div>
            
            <div class="modal-actions" style="margin-top: 25px;">
                <button id="cancelar">Cancelar</button>
                <button id="salvar">Salvar (Apenas Visual)</button>
            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../js/global.js"></script>
<script src="../js/perfil.js"></script>
</body>
</html>
