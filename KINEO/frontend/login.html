<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Thambi+2:wght@400..800&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="box">
            <img class="logo" src="assets/icons/logo_vertical.svg">
            <h2>TREINOS PERSONALIZADOS COM</h2>
            <h2 class="destaque">INTELIGÊNCIA ARTIFICIAL</h2>
        </div>

        <div class="box">
            <div class="content">
                <h1>Login</h1>
                <hr>
                <div class="form">
                    <h4> Email </h4>
                    <input type="text" name="email" id="email" placeholder="Digite seu email">
                    <br>
                    <h4> Senha </h4>        
                    <input type="password" name="password" id="password" placeholder="Digite sua senha">   
                    <br>
                    <a href="#" class="forgot-pass">Esqueci minha senha</a>     
                    <br><br><br>
                    <div class="options">
                        <label class="switch">
                            <input type="checkbox" id="remember-me">
                            <span class="slider"></span>
                            <span class="switch-text">Lembrar de mim</span>
                        </label>
                    </div>  
                </div> 
            </div>
            
            <br><br>
            <a href="index.html"><button class="btn">Entrar</button></a>
            
        </div>        
    </div>
    

</body>
</html>
